about:
  title: “个人简介”
  description: |
    毕业于安徽工程大学（安徽芜湖），学习物联网工程专业，另外辅修视觉传达设计课程。计算机学院物联网协会会员。
    毕业后进入计算机相关行业，并为电商公司提供资源设计。

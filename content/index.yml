faq:
  title: 常见信息
  description: 快速了解我的技能、合作方式和博客更新方向。
  categories:
    - title: 技术方向
      questions:
        - label: 主要技术栈是什么？
          content: |
            目前主要使用 Vue、Nuxt、TypeScript、Node.js 和现代 CSS。也会根据项目需要补充服务端、数据库、部署和自动化相关能力。
        - label: 博客会写什么？
          content: |
            主要写项目复盘、源码阅读、工程化实践、性能优化、AI 辅助开发和个人成长记录，尽量沉淀可复用的方法。
        - label: 项目如何展示？
          content: |
            每个项目会说明背景、职责、技术栈、关键难点和最终产出。你可以在 `content/projects` 中继续补充真实项目。
    - title: 联系方式
      questions:
        - label: 如何联系你？
          content: |
            把 `app/app.config.ts` 中的 `email`、GitHub 和 LinkedIn 链接替换成你的真实信息即可。
        - label: 是否接受合作机会？
          content: |
            默认首页会展示”欢迎交流机会”。如果暂时不希望展示，可以把 `app/app.config.ts` 中的 `available` 改为 `false`。
